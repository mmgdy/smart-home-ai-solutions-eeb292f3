name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy each edge function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: vgwptcvjhmphqhoepbri
        run: |
          set -e
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            # Skip shared/private helper folders (start with _)
            case "$name" in _*) echo "Skipping $name"; continue;; esac
            echo "==> Deploying $name"
            supabase functions deploy "$name" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt || exit 1
          done
